<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark premium background matching site. Removed rounded corners for OG image compatibility -->
  <rect width="256" height="256" fill="#0f172a"/>
  
  <!-- Subtle glowing background for the M -->
  <circle cx="128" cy="128" r="90" fill="#D4AF37" fill-opacity="0.1" filter="blur(20px)"/>
  
  <!-- The M character -->
  <path d="M70 180 V76 L128 136 L186 76 V180" 
